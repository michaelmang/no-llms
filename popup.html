<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No LLM Sites</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup-body">
    <main class="popup">
      <div class="shield" aria-hidden="true">×</div>
      <p id="protection-status" class="eyebrow">Checking protection…</p>
      <h1 id="protection-title">Preparing your blocklist</h1>
      <p id="count">Loading blocklist…</p>
      <button id="enable-protection" type="button" hidden>Enable protection</button>
      <button id="open-settings" type="button">Manage blocked websites</button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
